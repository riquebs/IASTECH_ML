<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de Excel Avançado</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f6f9;
            color: #333;
        }
        h2 { color: #2c3e50; }
        #search {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }
        .table-container {
            overflow-x: auto;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            /* Centraliza o texto horizontalmente e verticalmente */
            text-align: center; 
            vertical-align: middle;
        }
        th {
            background-color: #34495e;
            color: white;
            position: sticky;
            top: 0;
        }
        tr:nth-child(even) { background-color: #f9f9f9; }
        tr:hover { background-color: #f1f1f1; }
        .loading { font-style: italic; color: #7f8c8d; }
        
        /* Estilo para os hiperlinks automáticos */
        .excel-link {
            color: #3498db;
            text-decoration: none;
            font-weight: bold;
        }
        .excel-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <h2>📊 Consulta de Dados</h2>
    
    <input type="text" id="search" onkeyup="filterTable()" placeholder="Digite para buscar informações...">

    <div class="table-container">
        <div id="loading" class="loading">Carregando dados do Excel...</div>
        <table id="excel-table" style="display: none;">
            <thead id="table-head"></thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <script>
        const excelFile = 'dados.xlsx'; 

        async function loadExcel() {
            try {
                const response = await fetch(excelFile);
                if (!response.ok) throw new Error("Não foi possível encontrar o arquivo " + excelFile);
                
                const arrayBuffer = await response.arrayBuffer();
                const data = new Uint8Array(arrayBuffer);
                const workbook = XLSX.read(data, { type: 'array' });
                
                const firstSheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[firstSheetName];
                
                // header: 1 garante que recebemos uma matriz de linhas e colunas
                const jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
                
                if (jsonData.length > 0) {
                    displayTable(jsonData);
                } else {
                    document.getElementById('loading').innerText = "O arquivo Excel está vazio.";
                }
            } catch (error) {
                document.getElementById('loading').innerText = "Erro ao carregar os dados: " + error.message;
            }
        }

        // Função auxiliar para tratar e formatar o texto de cada célula
        function formatCellValue(value) {
            if (value === undefined || value === null) return '';

            // 1. Verifica se é um link (se começa com http:// ou https://)
            const stringValue = String(value).trim();
            if (stringValue.startsWith('http://') || stringValue.startsWith('https://')) {
                return `<a href="${stringValue}" target="_blank" class="excel-link">Acessar Link</a>`;
            }

            // 2. Verifica se é um número para formatar como Moeda (R$)
            // Se for um número puro no Excel, formatamos. 
            if (typeof value === 'number') {
                return value.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            }

            return value;
        }

        function displayTable(data) {
            const head = document.getElementById('table-head');
            const body = document.getElementById('table-body');
            
            head.innerHTML = "";
            body.innerHTML = "";

            const headers = data[0];
            let headRow = "<tr>";
            headers.forEach(header => {
                headRow += `<th>${header || ''}</th>`;
            });
            headRow += "</tr>";
            head.innerHTML = headRow;

            for (let i = 1; i < data.length; i++) {
                let bodyRow = "<tr>";
                for (let j = 0; j < headers.length; j++) {
                    // Passa o valor pela função de formatação antes de colocar na tabela
                    const formattedValue = formatCellValue(data[i][j]);
                    bodyRow += `<td>${formattedValue}</td>`;
                }
                bodyRow += "</tr>";
                body.innerHTML += bodyRow;
            }

            document.getElementById('loading').style.display = 'none';
            document.getElementById('excel-table').style.display = 'table';
        }

        function filterTable() {
            const input = document.getElementById("search");
            const filter = input.value.toUpperCase();
            const table = document.getElementById("excel-table");
            const tr = table.getElementsByTagName("tr");

            for (let i = 1; i < tr.length; i++) {
                let rowContainsFilter = false;
                const tds = tr[i].getElementsByTagName("td");
                
                for (let j = 0; j < tds.length; j++) {
                    if (tds[j] && tds[j].innerText.toUpperCase().indexOf(filter) > -1) {
                        rowContainsFilter = true;
                        break;
                    }
                }
                tr[i].style.display = rowContainsFilter ? "" : "none";
            }
        }

        window.onload = loadExcel;
    </script>
</body>
</html>
